    {% extends 'base.html' %}
    {% block styles %} <link rel="stylesheet" href="{{ url_for('static', filename= 'css/forms.css') }}"> {% endblock %}
    {% block content %}
    <div class="form-container">
        <div class="edit-milestone-card">
            <h1 class="card-title">Edit Milestone</h1>
            <form class="edit-milestone-form" action="{{ url_for('edit_milestone', projectId=project.projectId, milestoneId=milestone.milestoneId) }}" method="POST">
            
                <div class="form-field">
                    <label for="milestoneName">Milestone Name:</label>
                    <input type="text" id="milestoneName" name="milestoneName" value="{{ milestone.milestoneName }}" required>
                </div>
            
                <div class="form-field">
                    <label for="milestoneDescription">Description (optional):</label>
                    <textarea id="milestoneDescription" name="milestoneDescription">{{ milestone.description }}</textarea>
                </div>
                <div class = "form-field">
                    <label for="milestoneStatus">Status:</label>
                    <select id="milestoneStatus" name="milestoneStatus">
                        <option value="Not Started" {% if milestone.status == 'Not Started' %} selected {% endif %} >Not Started</option>
                        <option value="Started" {% if milestone.status == 'Started' %} selected {% endif %} >Started</option>
                        <option value="Completed" {% if milestone.status == 'Completed' %} selected {% endif %}>Completed</option>
                    </select>
            
                </div>
                <div class = "form-field">
                    <label for="milestoneStartDate">Start Date:</label>
                    <input type="date" id="milestoneStartDate" name="milestoneStartDate" value="{{ milestone.startDate }}" required>
                </div>
                <div class = "form-field">
                    <label for="milestoneEndDate">End Date:</label>
                    <input type="date" id="milestoneEndDate" name="milestoneEndDate" value="{{ milestone.endDate }}">
                </div>
                <div class ="btn-group">
                    <button class="btn btn-primary" type="submit">Edit Milestone</button>
                    <a class="btn btn-secondary" href="{{ url_for('project_detail', projectId=project.projectId) }}">go back</a>
                </div>
            </form>
        </div>
    </div>
    {% endblock %}
