<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master</title>
</head>
<body>
    <h1>Edit Task: {{ task.taskName }}</h1>

    <form action="{{ url_for('edit_task', projectId=task.projectId, taskId=task.taskId) }}" method="POST">
        <div class = 'form-group'>
            <label for = 'taskName'>Task Name:</label>
            <input type = 'text' id="taskName" name="taskName" value="{{ task.taskName }}">
        </div>

        <div class = 'form-group'>
            <label for = "taskDescription">Description:</label>
            <textarea id = "taskDescription" name="taskDescription" value="{{ task.description }}"></textarea>
        </div>

        <div class = "form-group">

            <label for="taskStatus">Status:</label>
            <select id="taskStatus" name="taskStatus" required>
                <option value="Not Started" {% if task.status == 'Not Started' %} select {% endif %}>Not Started</option>
                <option value="Started" {% if task.status == 'Started' %} select {% endif %}>Started</option>
                <option value="Completed" {% if task.status == 'Completed' %} select {% endif %}>Completed</option>
            </select>
        </div>

        <div class = 'form-group'>
            <label for="taskDueDate">Due Date:</label>
            <input type="date" id="taskDueDate" name="taskDueDate" value="{{ task.dueDate }}">
        </div>

        <div class = 'submit-button'>
            <button type="submit">Edit task</button>
        </div>



    </form>
    
</body>
</html>
