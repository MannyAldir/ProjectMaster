<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master</title>
</head>
<body>
        <div class="nav-layout">
        <nav class="nav-bar">
            <ul>
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('project_page') }}">Projects</a></li>
            </ul>

            <form action="{{ url_for('logout')}}" method="POST">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </div>
    
    <h1>Projects</h1>

    <div class="new-prj-bttn">
        <a href="{{ url_for('new_project')}}">Create New Project</a>
    

    </div>
    
    <div class="project-list">
        {% for project in projects %}
            <div class = "project-item">
                <p>{{ project.projectName }}</p>
                <p>{{ project.description }}</p>
                <p>{{ project.startDate }}</p>
                <p>{{ project.status }}</p>
                
            </div>

            <div class = "edit-project">
                <a href="{{ url_for('edit_project', projectId=project.projectId) }}">Edit Project</a>
            </div>
            
            <div class = "visit-project">
                <a href="{{ url_for('project_detail', projectId=project.projectId)}}">View details</a>
            </div>

        {% else %}
            <p>No projects available</p>
        {% endfor %}

    </div>
    
</body>
</html>
