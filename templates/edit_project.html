{% extends 'base.html' %}
{% block styles %} <link rel="stylesheet" href="{{ url_for('static', filename= 'css/forms.css') }}"> {% endblock %}
{% block content %}
    <div class="form-container">
        <div class="edit-project-card">
            <h1 class="card-title">Edit Project</h1>
            <form class="edit-project-form" action="{{ url_for('edit_project', projectId=project.projectId) }}" method="POST">
                <div class = form-field>
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" name="projectName" value="{{ project.projectName}}">
                </div>
                <div class = form-field>
                    <label for="description">Description</label>
                    <textarea id="description" name="description">{{ project.description }}</textarea>
                </div>
                <div class="form-field">
                    <label for="status">Status:</label>
                    <select id="status" name="status">
                        <option value="inactive" {% if project.status == 'inactive' %}selected{% endif %}>Inactive</option>
                        <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="start-date">Start Date:</label>
                    <input type="date" id="start-date" name="startDate" value="{{ project.startDate }}">
                <div class="btn-group">
                    <button class="btn btn-primary" type ="submit">Update Project</button>
                    <a class="btn btn-secondary" href="{{ url_for('project_page') }}">go back</a>
                </div>
            </form>
        </div>
    </div>
    {% endblock %}
