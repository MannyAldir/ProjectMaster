<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Master</title>
</head>
<body>
        <div class="nav-layout">
        <nav class="nav-bar">
            <ul>
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('project_page') }}">Projects</a></li>
            </ul>

            <form action="{{ url_for('logout')}}" method="POST">
                <button type="submit">Logout</button>
            </form>
        </nav>
    </div>
    
    <h1>Edit Project</h1>
    
    <form action="{{ url_for('edit_project', projectId=project.projectId) }}" method="POST">
        <div class = form-group>
            <label for="projectName">Project Name</label>
            <input type="text" id="projectName" name="projectName" value="{{ project.projectName}}">
        </div>

        <div class = form-group>
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ project.description }}</textarea>
        </div>

        <div class="form-group">
            <label for="status">Status:</label>
            <select id="status" name="status">
                <option value="inactive" {% if project.status == 'inactive' %}selected{% endif %}>Inactive</option>
                <option value="active" {% if project.status == 'active' %}selected{% endif %}>Active</option>
                <option value="completed" {% if project.status == 'completed' %}selected{% endif %}>Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label for="start-date">Start Date:</label>
            <input type="date" id="start-date" name="startDate" value="{{ project.startDate }}">

        <div class="submit-button">
            <button type ="submit">Update Project</button>
        </div>
    </form>
    
</body>
</html>
